spring.application.name=spring-ai-multimodel

server.port=8081

#we need to off auto chat client conf first for multi-model config
#spring.ai.chat.auto-config.enabled=false


#openai config
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4.1
#we have a lot of options which we can use
#spring.ai.openai.chat.options.temperature=0.2
#spring.ai.openai.chat.options.max-tokens=2048



#ollama config
#spring.ai.ollama.base-url=http://localhost:11434
#spring.ai.ollama.chat.options.model=codellama:latest
#spring.ai.ollama.chat.options.temperature=0.7

#
logging.level.org.springframework.ai.chat.client.advisor=DEBUG
logging.level.org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor=DEBUG

#db configuration for storing conversation history using postgresql
spring.datasource.url=jdbc:postgresql://localhost:5432/spring-ai
spring.datasource.username=postgres
spring.datasource.password=root

spring.ai.chat.memory.repository.jdbc.initialize-schema=always
