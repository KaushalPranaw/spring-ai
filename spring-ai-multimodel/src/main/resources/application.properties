spring.application.name=spring-ai-multimodel

server.port=8081

#we need to off auto chat client conf first
spring.ai.chat.auto-config.enabled=false


#openai config
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4.1
spring.ai.openai.chat.options.temperature=0.2

#ollama config
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=codellama:latest
spring.ai.ollama.chat.options.temperature=0.7

